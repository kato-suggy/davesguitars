name = "davesguitars"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"

[[kv_namespaces]]
binding = "BLOG_KV"
id = "placeholder"
preview_id = "placeholder"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "davesguitars-images"

[vars]
SITE_URL = "https://davesguitar.co.uk"
SITE_NAME = "Dave's Guitars"

# Secrets — set with: wrangler secret put <NAME>
# ADMIN_PASSWORD_HASH  - bcrypt hash of Dave's password
# SESSION_SECRET       - random 32-byte hex string
# RESEND_API_KEY       - from resend.com
# CONTACT_EMAIL        - Dave's email address
