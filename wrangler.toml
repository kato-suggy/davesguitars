name = "davesguitars"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"

[vars]
SITE_URL = "https://davesguitar.co.uk"
SITE_NAME = "Dave's Guitars"
# Google Place ID for Dave's Google Business listing.
# Public identifier (not a secret) — kept here so it ships with the worker.
PLACE_ID = "ChIJmVPVDflufkgRuAgB93v-5Bw"

# Secrets — set locally in .dev.vars (gitignored), in prod with: wrangler secret put <NAME>
# RESEND_API_KEY           - from resend.com
# CONTACT_EMAIL            - Dave's email address
# GOOGLE_PLACES_API_KEY    - Maps Platform key restricted to Places API (legacy)

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true
